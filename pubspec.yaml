name: bugman_graphs
description: Internal pest control graphing app for Holloman Exterminators.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  # Avoid OneDrive symlink cleanup failures during web/editor validation.
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/branding/holloman_exterminators.png
